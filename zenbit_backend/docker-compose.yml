services:
  app:
    container_name: zenbit_app
    build: .
    ports:
      - "${APP_PORT}:${APP_PORT}"
    env_file:
      - .env
    depends_on:
      - db

  db:
    image: postgres:15
    container_name: zenbit_postgres
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:${DB_PORT}"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: zenbit_redis
    ports:
      - "${REDIS_PORT}:${REDIS_PORT}"

volumes:
  postgres_data: